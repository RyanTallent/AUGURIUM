# AUGURIUM — Render Blueprint (production-oriented)
# Monorepo: npm workspaces at repository root (apps/web, apps/worker, packages/*)
# Docs: https://render.com/docs/blueprint-spec
#
# DATABASE_URL is wired from Render Postgres over the private network.
# For Prisma pooling in production, you may append to DATABASE_URL in the Dashboard:
#   &connect_timeout=30&pool_timeout=30&connection_limit=10
# (one web + one worker instance; adjust connection_limit per instance count)

databases:
  - name: augurium-db
    databaseName: augurium
    user: augurium
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []

envVarGroups:
  - name: augurium-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.12.0"
      - key: POLYMARKET_GAMMA_BASE
        value: https://gamma-api.polymarket.com
      - key: POLYMARKET_DATA_BASE
        value: https://data-api.polymarket.com
      - key: WORKER_POLL_INTERVAL_MS
        value: "30000"
      - key: SCORE_TRADERS_BATCH_SIZE
        value: "250"
      - key: WORKER_INTERVAL_TRADER_SCORE_MS
        value: "30000"
      - key: WORKER_INTERVAL_SHADOW_SYNC_MS
        value: "30000"
      - key: SHADOW_SYNC_BATCH_SIZE
        value: "250"
      - key: SHADOW_SYNC_CHUNK_SIZE
        value: "25"
      - key: SHADOW_SYNC_MAX_RUNTIME_MS
        value: "180000"
      - key: EXECUTION_ENABLED
        value: "false"
      - key: EXECUTION_PROVIDER
        value: paper
      - key: LIVE_TRADING_ENABLED
        value: "false"
      - key: ALLOW_REAL_MONEY
        value: "false"
      - key: PAPER_COPY_ENABLED
        value: "false"
      - key: EXECUTION_ENABLED
        value: "true"
      - key: EXECUTION_PROVIDER
        value: polymarket
      - key: LIVE_TRADING_ENABLED
        value: "true"
      - key: ALLOW_REAL_MONEY
        value: "true"
      - key: POLYMARKET_CLOB_READY
        value: "true"
      - key: LIVE_COPY_SKIP_SYSTEM_READINESS
        value: "true"
      - key: COPY_LIVE_BANKROLL_USD
        value: "500"
      - key: COPY_LIVE_ORDER_TYPE
        value: market
      - key: WORKER_INTERVAL_WEB_SNAPSHOT_REFRESH_MS
        value: "180000"
      - key: DISCORD_ENABLED
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: POLYMARKET_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_API_KEY
        sync: false
      - key: POLYMARKET_API_SECRET
        sync: false
      - key: POLYMARKET_API_PASSPHRASE
        sync: false
      - key: POLYMARKET_FUNDER_ADDRESS
        sync: false

services:
  - type: keyvalue
    name: augurium-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: augurium-web
    runtime: node
    region: oregon
    plan: starter
    buildCommand: >-
      npm ci --include=dev &&
      npm run db:generate &&
      npm run build:packages &&
      npm run build --workspace=@augurium/web
    preDeployCommand: npm run db:push
    startCommand: npm run start --workspace=@augurium/web
    healthCheckPath: /api/health
    autoDeploy: true
    buildFilter:
      paths:
        - apps/web/**
        - packages/**
        - package.json
        - package-lock.json
      ignoredPaths:
        - apps/worker/**
        - scripts/**
        - "**/*.md"
    envVars:
      - fromGroup: augurium-shared
      - key: AUGURIUM_SERVICE
        value: web
      - key: WEB_PRISMA_CONNECTION_LIMIT
        value: "5"
      - key: WEB_HEALTH_DB_TIMEOUT_MS
        value: "20000"
      - key: WEB_MAX_CONCURRENT_QUERIES
        value: "2"
      - key: WEB_SNAPSHOT_STALE_MS
        value: "600000"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"
      - key: DATABASE_URL
        fromDatabase:
          name: augurium-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: augurium-redis
          property: connectionString
      - key: AUGURIUM_DASHBOARD_URL
        sync: false

  - type: worker
    name: augurium-worker
    runtime: node
    region: oregon
    plan: starter
    buildCommand: >-
      npm ci --include=dev &&
      npm run db:generate &&
      npm run build:worker
    preDeployCommand: npm run db:push
    startCommand: npm run start --workspace=@augurium/worker
    autoDeploy: true
    buildFilter:
      paths:
        - apps/worker/**
        - packages/**
        - package.json
        - package-lock.json
      ignoredPaths:
        - apps/web/**
        - scripts/**
        - "**/*.md"
    envVars:
      - fromGroup: augurium-shared
      - key: AUGURIUM_SERVICE
        value: worker
      - key: WORKER_PRISMA_CONNECTION_LIMIT
        value: "8"
      - key: COPY_AUTO_PIPELINE_ENABLED
        value: "true"
      - key: PAPER_COPY_ENABLED
        value: "false"
      - key: WORKER_INTERVAL_COPY_AUTO_PIPELINE_MS
        value: "540000"
      - key: COPY_AUTO_INCLUDE_WALLET_ACTIVITY
        value: "true"
      - key: COPY_AUTO_WALLET_ACTIVITY_BATCH
        value: "8"
      - key: LIVE_COPY_ENABLED
        value: "true"
      - key: COPY_WEEKLY_MAX_LOSS_PCT
        value: "0.2"
      - key: DATABASE_URL
        fromDatabase:
          name: augurium-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: augurium-redis
          property: connectionString
      - key: AUGURIUM_DASHBOARD_URL
        fromService:
          type: web
          name: augurium-web
          envVarKey: RENDER_EXTERNAL_URL
