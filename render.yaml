# AUGURIUM — Render Blueprint (production-oriented)
# Monorepo: npm workspaces at repository root (apps/web, apps/worker, packages/*)
# Docs: https://render.com/docs/blueprint-spec
#
# DATABASE_URL is wired from Render Postgres over the private network.
# For Prisma pooling in production, you may append to DATABASE_URL in the Dashboard:
#   &connect_timeout=30&pool_timeout=30&connection_limit=10
# (one web + one worker instance; adjust connection_limit per instance count)

databases:
  - name: augurium-db
    databaseName: augurium
    user: augurium
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"
    ipAllowList: []

envVarGroups:
  - name: augurium-shared
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.12.0"
      - key: POLYMARKET_GAMMA_BASE
        value: https://gamma-api.polymarket.com
      - key: POLYMARKET_DATA_BASE
        value: https://data-api.polymarket.com
      - key: WORKER_POLL_INTERVAL_MS
        value: "30000"
      - key: SCORE_TRADERS_BATCH_SIZE
        value: "750"
      - key: WORKER_INTERVAL_TRADER_SCORE_MS
        value: "30000"
      - key: WORKER_INTERVAL_TRADE_INGEST_MS
        value: "60000"
      - key: WORKER_INTERVAL_WALLET_DISCOVER_MS
        value: "120000"
      - key: INGEST_TRADES_PAGE_SIZE
        value: "200"
      - key: INGEST_TRADES_MAX_PAGES
        value: "25"
      - key: WALLET_DISCOVER_MARKETS_PER_RUN
        value: "60"
      - key: WALLET_DISCOVER_HOLDERS_LIMIT
        value: "100"
      - key: WALLET_ACTIVITY_BATCH_SIZE
        value: "25"
      - key: POSITION_SYNC_BATCH_SIZE
        value: "40"
      - key: WORKER_INTERVAL_SHADOW_SYNC_MS
        value: "30000"
      - key: SHADOW_SYNC_BATCH_SIZE
        value: "250"
      - key: SHADOW_SYNC_CHUNK_SIZE
        value: "25"
      - key: SHADOW_SYNC_MAX_RUNTIME_MS
        value: "180000"
      - key: EXECUTION_ENABLED
        value: "true"
      - key: EXECUTION_PROVIDER
        value: polymarket-us
      - key: LIVE_TRADING_ENABLED
        value: "true"
      - key: ALLOW_REAL_MONEY
        value: "true"
      - key: PAPER_COPY_ENABLED
        value: "false"
      - key: POLYMARKET_US_READY
        value: "true"
      - key: LIVE_COPY_SKIP_SYSTEM_READINESS
        value: "true"
      - key: COPY_LIVE_BANKROLL_USD
        value: "200"
      - key: COPY_LIVE_USE_ACCOUNT_BALANCE
        value: "true"
      - key: COPY_LIVE_POSITION_PCT
        value: "0.05"
      - key: COPY_LIVE_MAX_DEPLOYED_PCT
        value: "0.25"
      - key: COPY_MAX_CAPITAL_PER_TRADER_PCT
        value: "0.25"
      - key: COPY_MAX_CAPITAL_PER_MARKET_PCT
        value: "0.20"
      - key: COPY_INTEL_SOURCE
        value: polymarketscan
      - key: US_COMPAT_STRICT_MODE
        value: "true"
      - key: US_COMPAT_MIN_CONFIDENCE
        value: "0.90"
      - key: COPY_MAX_SOURCE_ROI_TO_MIRROR
        value: "0.20"
      - key: COPY_LIVE_ORDER_TYPE
        value: market
      - key: WORKER_INTERVAL_WEB_SNAPSHOT_REFRESH_MS
        value: "180000"
      - key: DISCORD_ENABLED
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DISCORD_WEBHOOK_TRADE_ENTER
        sync: false
      - key: DISCORD_WEBHOOK_TRADE_EXIT
        sync: false
      - key: DISCORD_WEBHOOK_TRADE_PROBLEM
        sync: false
      - key: DISCORD_WEBHOOK_PORTFOLIO_HEALTH
        sync: false
      - key: DISCORD_WEBHOOK_BRAIN
        sync: false
      - key: DISCORD_WEBHOOK_RISK
        sync: false
      - key: DISCORD_WEBHOOK_JOURNAL
        sync: false
      - key: POLYMARKET_PRIVATE_KEY
        sync: false
      - key: POLYMARKET_API_KEY
        sync: false
      - key: POLYMARKET_API_SECRET
        sync: false
      - key: POLYMARKET_API_PASSPHRASE
        sync: false
      - key: POLYMARKET_FUNDER_ADDRESS
        sync: false
      - key: POLYMARKET_US_KEY_ID
        sync: false
      - key: POLYMARKET_US_SECRET_KEY
        sync: false

services:
  - type: keyvalue
    name: augurium-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: augurium-web
    runtime: node
    region: oregon
    plan: starter
    buildCommand: >-
      npm ci --include=dev &&
      npm run db:generate &&
      npm run build:packages &&
      npm run build --workspace=@augurium/web
    preDeployCommand: npm run db:push
    startCommand: npm run start --workspace=@augurium/web
    healthCheckPath: /api/health
    autoDeploy: true
    buildFilter:
      paths:
        - apps/web/**
        - packages/**
        - package.json
        - package-lock.json
      ignoredPaths:
        - apps/worker/**
        - scripts/**
        - "**/*.md"
    envVars:
      - fromGroup: augurium-shared
      - key: AUGURIUM_SERVICE
        value: web
      - key: WEB_PRISMA_CONNECTION_LIMIT
        value: "5"
      - key: WEB_HEALTH_DB_TIMEOUT_MS
        value: "20000"
      - key: WEB_MAX_CONCURRENT_QUERIES
        value: "2"
      - key: WEB_SNAPSHOT_STALE_MS
        value: "600000"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=384"
      - key: DATABASE_URL
        fromDatabase:
          name: augurium-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: augurium-redis
          property: connectionString
      - key: AUGURIUM_DASHBOARD_URL
        sync: false

  - type: worker
    name: augurium-worker
    runtime: node
    region: oregon
    plan: starter
    buildCommand: >-
      npm ci --include=dev &&
      npm run db:generate &&
      npm run build:worker
    startCommand: npm run start --workspace=@augurium/worker
    autoDeploy: true
    buildFilter:
      paths:
        - apps/worker/**
        - packages/**
        - package.json
        - package-lock.json
      ignoredPaths:
        - apps/web/**
        - scripts/**
        - "**/*.md"
    envVars:
      - fromGroup: augurium-shared
      - key: AUGURIUM_SERVICE
        value: worker
      - key: WORKER_PRISMA_CONNECTION_LIMIT
        value: "8"
      - key: COPY_AUTO_PIPELINE_ENABLED
        value: "true"
      - key: PAPER_COPY_ENABLED
        value: "false"
      - key: WORKER_INTERVAL_COPY_AUTO_PIPELINE_MS
        value: "180000"
      - key: COPY_INTEL_SOURCE
        value: polymarketscan
      - key: US_COMPAT_STRICT_MODE
        value: "true"
      - key: US_COMPAT_MIN_CONFIDENCE
        value: "0.90"
      - key: COPY_AUTO_INCLUDE_WALLET_ACTIVITY
        value: "false"
      - key: COPY_AUTO_SYNC_GENERAL_POSITIONS
        value: "false"
      - key: WORKER_INTERVAL_PORTFOLIO_HEALTH_MS
        value: "86400000"
      - key: COPY_AUTO_WALLET_ACTIVITY_BATCH
        value: "60"
      - key: COPY_AUTO_INCLUDE_WALLET_DISCOVER
        value: "false"
      - key: COPY_LIVE_CANDIDATE_POOL
        value: "1000"
      - key: COPY_LIVE_MAX_LEADERS
        value: "100"
      - key: COPY_LIVE_MAX_ORDERS_PER_RUN
        value: "20"
      - key: POSITION_SYNC_COPY_BATCH
        value: "100"
      - key: COPY_RISING_WALLET_LIMIT
        value: "40"
      - key: LIVE_COPY_ENABLED
        value: "true"
      - key: EXECUTION_ENABLED
        value: "true"
      - key: EXECUTION_PROVIDER
        value: polymarket-us
      - key: LIVE_TRADING_ENABLED
        value: "true"
      - key: ALLOW_REAL_MONEY
        value: "true"
      - key: POLYMARKET_US_READY
        value: "true"
      - key: POLYMARKET_SIGNATURE_TYPE
        value: "1"
      - key: COPY_WEEKLY_MAX_LOSS_PCT
        value: "0.2"
      - key: DISCORD_LIVE_COPY_ONLY
        value: "true"
      - key: LIVE_COPY_CLOSE_ON_EXIT
        value: "true"
      - key: COPY_LIVE_TAKE_PROFIT_PCT
        value: "0.2"
      - key: COPY_LIVE_POSITION_PCT
        value: "0.05"
      - key: COPY_LIVE_MAX_DEPLOYED_PCT
        value: "0.25"
      - key: COPY_MAX_CAPITAL_PER_TRADER_PCT
        value: "0.25"
      - key: COPY_MAX_CAPITAL_PER_MARKET_PCT
        value: "0.20"
      - key: DISCORD_WEBHOOK_TRADE_ENTER
        sync: false
      - key: DISCORD_WEBHOOK_TRADE_EXIT
        sync: false
      - key: DISCORD_WEBHOOK_TRADE_PROBLEM
        sync: false
      - key: DISCORD_WEBHOOK_PORTFOLIO_HEALTH
        sync: false
      - key: DISCORD_WEBHOOK_BRAIN
        sync: false
      - key: DISCORD_WEBHOOK_RISK
        sync: false
      - key: DISCORD_WEBHOOK_JOURNAL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: augurium-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: augurium-redis
          property: connectionString
      - key: AUGURIUM_DASHBOARD_URL
        fromService:
          type: web
          name: augurium-web
          envVarKey: RENDER_EXTERNAL_URL
