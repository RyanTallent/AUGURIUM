name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build --workspace=@augurium/shared
      - run: npm run generate --workspace=@augurium/database
        env:
          DATABASE_URL: postgresql://augurium:augurium@localhost:5432/augurium
      - run: npm run build --workspace=@augurium/web
      - run: npm run build --workspace=@augurium/worker
